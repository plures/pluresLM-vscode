name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npm run typecheck --if-present || npx tsc --noEmit
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run compile --if-present || npm run build --if-present
